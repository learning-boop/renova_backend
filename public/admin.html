<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kensley Aesthetics Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f4f5;
      color: #18181b;
      min-height: 100vh;
    }

    /* ── Login ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }

    .login-card h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .login-card p {
      color: #71717a;
      font-size: .875rem;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      color: #3f3f46;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e4e4e7;
      border-radius: 8px;
      font-size: .9rem;
      margin-bottom: 16px;
      outline: none;
      transition: border-color .15s;
    }

    input:focus { border-color: #a78bfa; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }

    .btn:hover { opacity: .85; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .btn-primary { background: #7c3aed; color: #fff; width: 100%; }
    .btn-sm { padding: 5px 12px; font-size: .75rem; }
    .btn-ghost { background: #f4f4f5; color: #3f3f46; }

    .error-msg {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: .825rem;
      margin-top: 12px;
      display: none;
    }

    /* ── App shell ── */
    #app { display: none; }

    header {
      background: #fff;
      border-bottom: 1px solid #e4e4e7;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 1.1rem; font-weight: 700; }
    header span { font-size: .8rem; color: #71717a; }

    main { padding: 28px; max-width: 1100px; margin: 0 auto; }

    /* ── Stats bar ── */
    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: #fff;
      border-radius: 10px;
      border: 1px solid #e4e4e7;
      padding: 16px 24px;
      flex: 1;
      min-width: 120px;
    }

    .stat-card .label { font-size: .75rem; color: #71717a; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
    .stat-card .value { font-size: 1.8rem; font-weight: 700; margin-top: 4px; }
    .stat-card.new .value    { color: #7c3aed; }
    .stat-card.read .value   { color: #2563eb; }
    .stat-card.replied .value{ color: #16a34a; }

    /* ── Filters ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 6px 16px;
      border: 1.5px solid #e4e4e7;
      border-radius: 20px;
      background: #fff;
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      color: #52525b;
    }

    .filter-btn.active {
      background: #7c3aed;
      border-color: #7c3aed;
      color: #fff;
    }

    .toolbar-right { margin-left: auto; }

    /* ── Table ── */
    .table-wrap {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e4e4e7;
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }

    thead { background: #fafafa; }

    th {
      text-align: left;
      padding: 12px 16px;
      font-size: .75rem;
      font-weight: 700;
      color: #71717a;
      text-transform: uppercase;
      letter-spacing: .05em;
      border-bottom: 1px solid #e4e4e7;
    }

    td {
      padding: 14px 16px;
      font-size: .875rem;
      border-bottom: 1px solid #f4f4f5;
      vertical-align: top;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .badge-new     { background: #ede9fe; color: #7c3aed; }
    .badge-read    { background: #dbeafe; color: #2563eb; }
    .badge-replied { background: #dcfce7; color: #16a34a; }

    .message-cell {
      max-width: 280px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #52525b;
    }

    .actions { display: flex; gap: 6px; flex-wrap: wrap; }

    /* ── Empty / loading ── */
    .empty-row td {
      text-align: center;
      padding: 48px;
      color: #a1a1aa;
      font-size: .9rem;
    }

    /* ── Detail drawer ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.4);
      display: none;
      z-index: 100;
    }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 420px;
      max-width: 100vw;
      background: #fff;
      box-shadow: -4px 0 32px rgba(0,0,0,.1);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      z-index: 101;
    }

    .drawer-header {
      padding: 20px 24px;
      border-bottom: 1px solid #e4e4e7;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .drawer-header h2 { font-size: 1rem; font-weight: 700; }

    .close-btn {
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: #71717a;
      line-height: 1;
    }

    .drawer-body { padding: 24px; flex: 1; }

    .detail-row { margin-bottom: 20px; }
    .detail-row .dlabel { font-size: .75rem; font-weight: 700; color: #71717a; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
    .detail-row .dvalue { font-size: .9rem; line-height: 1.6; word-break: break-word; }

    .drawer-footer {
      padding: 16px 24px;
      border-top: 1px solid #e4e4e7;
      display: flex;
      gap: 8px;
    }

    .btn-new     { background: #ede9fe; color: #7c3aed; }
    .btn-read    { background: #dbeafe; color: #2563eb; }
    .btn-replied { background: #dcfce7; color: #16a34a; }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <h1>Kensley Aesthetics Admin</h1>
    <p>Enter your credentials to access the dashboard.</p>
    <label for="api-url">API Base URL</label>
    <input type="text" id="api-url" value="http://localhost:5000" placeholder="https://your-api.com" />
    <label for="api-key">Admin API Key</label>
    <input type="password" id="api-key" placeholder="••••••••••••" />
    <button class="btn btn-primary" id="login-btn" onclick="login()">Sign in</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <header>
    <h1>Kensley Aesthetics Admin</h1>
    <div style="display:flex;align-items:center;gap:12px;">
      <span id="header-url"></span>
      <button class="btn btn-sm btn-ghost" onclick="logout()">Sign out</button>
    </div>
  </header>

  <main>
    <!-- Stats -->
    <div class="stats">
      <div class="stat-card new">
        <div class="label">New</div>
        <div class="value" id="stat-new">—</div>
      </div>
      <div class="stat-card read">
        <div class="label">Read</div>
        <div class="value" id="stat-read">—</div>
      </div>
      <div class="stat-card replied">
        <div class="label">Replied</div>
        <div class="value" id="stat-replied">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Total</div>
        <div class="value" id="stat-total">—</div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <button class="filter-btn active" onclick="setFilter(null, this)">All</button>
      <button class="filter-btn" onclick="setFilter('new', this)">New</button>
      <button class="filter-btn" onclick="setFilter('read', this)">Read</button>
      <button class="filter-btn" onclick="setFilter('replied', this)">Replied</button>
      <div class="toolbar-right">
        <button class="btn btn-sm btn-ghost" onclick="loadContacts()">&#8635; Refresh</button>
      </div>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Service</th>
            <th>Message</th>
            <th>Status</th>
            <th>Date</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="contacts-tbody">
          <tr class="empty-row"><td colspan="7">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- Detail drawer -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <h2>Contact detail</h2>
    <button class="close-btn" onclick="closeDrawer()">&#x2715;</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
  <div class="drawer-footer" id="drawer-footer"></div>
</div>

<script>
  let BASE_URL = '';
  let API_KEY = '';
  let activeFilter = null;
  let allContacts = [];
  let openContact = null;

  // ── Auth ──────────────────────────────────────────────────────────────────

  async function login() {
    const urlInput = document.getElementById('api-url').value.trim().replace(/\/$/, '');
    const keyInput = document.getElementById('api-key').value.trim();
    const err = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');

    err.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Checking…';

    try {
      const res = await fetch(`${urlInput}/api/contact`, {
        headers: { Authorization: `Bearer ${keyInput}` },
      });

      if (res.status === 401) throw new Error('Invalid API key.');
      if (res.status === 503) throw new Error('ADMIN_API_KEY is not configured on the server.');
      if (!res.ok) throw new Error(`Server returned ${res.status}.`);

      BASE_URL = urlInput;
      API_KEY = keyInput;
      sessionStorage.setItem('kensley_admin', JSON.stringify({ url: BASE_URL, key: API_KEY }));

      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('header-url').textContent = BASE_URL;

      const data = await res.json();
      allContacts = data.data || [];
      renderTable();
      renderStats();
      await loadAllForStats();
    } catch (e) {
      err.textContent = e.message;
      err.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  }

  function logout() {
    sessionStorage.removeItem('kensley_admin');
    BASE_URL = '';
    API_KEY = '';
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }

  // Auto-restore session
  window.addEventListener('DOMContentLoaded', () => {
    const saved = sessionStorage.getItem('kensley_admin');
    if (saved) {
      try {
        const { url, key } = JSON.parse(saved);
        document.getElementById('api-url').value = url;
        document.getElementById('api-key').value = key;
      } catch {}
    }
  });

  // ── Data ──────────────────────────────────────────────────────────────────

  async function loadContacts() {
    const url = activeFilter
      ? `${BASE_URL}/api/contact?status=${activeFilter}&limit=200`
      : `${BASE_URL}/api/contact?limit=200`;

    const res = await fetch(url, { headers: { Authorization: `Bearer ${API_KEY}` } });
    if (!res.ok) { alert('Failed to load contacts.'); return; }
    const data = await res.json();
    allContacts = data.data || [];
    renderTable();
    await loadAllForStats();
  }

  async function loadAllForStats() {
    const res = await fetch(`${BASE_URL}/api/contact?limit=200`, {
      headers: { Authorization: `Bearer ${API_KEY}` },
    });
    if (!res.ok) return;
    const data = await res.json();
    const all = data.data || [];
    document.getElementById('stat-total').textContent = all.length;
    document.getElementById('stat-new').textContent = all.filter(c => c.status === 'new').length;
    document.getElementById('stat-read').textContent = all.filter(c => c.status === 'read').length;
    document.getElementById('stat-replied').textContent = all.filter(c => c.status === 'replied').length;
  }

  async function updateStatus(id, status) {
    const res = await fetch(`${BASE_URL}/api/contact/${id}/status`, {
      method: 'PATCH',
      headers: { Authorization: `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ status }),
    });
    if (!res.ok) { alert('Failed to update status.'); return; }
    await loadContacts();
    if (openContact && openContact.id === id) {
      openContact.status = status;
      renderDrawer();
    }
  }

  // ── Filters ───────────────────────────────────────────────────────────────

  function setFilter(status, btn) {
    activeFilter = status;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadContacts();
  }

  // ── Render ────────────────────────────────────────────────────────────────

  function badge(status) {
    return `<span class="badge badge-${status}">${status}</span>`;
  }

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('en-GB', {
      day: 'numeric', month: 'short', year: 'numeric',
    });
  }

  function renderTable() {
    const tbody = document.getElementById('contacts-tbody');

    if (!allContacts.length) {
      tbody.innerHTML = `<tr class="empty-row"><td colspan="7">No contacts found.</td></tr>`;
      return;
    }

    tbody.innerHTML = allContacts.map(c => `
      <tr>
        <td><strong>${esc(c.name)}</strong></td>
        <td><a href="mailto:${esc(c.email)}" style="color:#7c3aed;">${esc(c.email)}</a></td>
        <td>${c.service ? esc(c.service) : '<span style="color:#a1a1aa">—</span>'}</td>
        <td class="message-cell" title="${esc(c.message)}">${esc(c.message)}</td>
        <td>${badge(c.status)}</td>
        <td style="white-space:nowrap;color:#71717a;">${formatDate(c.created_at)}</td>
        <td>
          <div class="actions">
            <button class="btn btn-sm btn-ghost" onclick='openDrawer(${JSON.stringify(c)})'>View</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  // ── Drawer ────────────────────────────────────────────────────────────────

  function openDrawer(contact) {
    openContact = contact;
    renderDrawer();
    document.getElementById('overlay').style.display = 'block';
    document.getElementById('drawer').style.display = 'flex';
  }

  function closeDrawer() {
    openContact = null;
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('drawer').style.display = 'none';
  }

  function renderDrawer() {
    const c = openContact;
    document.getElementById('drawer-body').innerHTML = `
      <div class="detail-row">
        <div class="dlabel">Status</div>
        <div class="dvalue">${badge(c.status)}</div>
      </div>
      <div class="detail-row">
        <div class="dlabel">Name</div>
        <div class="dvalue">${esc(c.name)}</div>
      </div>
      <div class="detail-row">
        <div class="dlabel">Email</div>
        <div class="dvalue"><a href="mailto:${esc(c.email)}" style="color:#7c3aed;">${esc(c.email)}</a></div>
      </div>
      ${c.phone ? `
      <div class="detail-row">
        <div class="dlabel">Phone</div>
        <div class="dvalue"><a href="tel:${esc(c.phone)}" style="color:#7c3aed;">${esc(c.phone)}</a></div>
      </div>` : ''}
      ${c.service ? `
      <div class="detail-row">
        <div class="dlabel">Service interest</div>
        <div class="dvalue">${esc(c.service)}</div>
      </div>` : ''}
      <div class="detail-row">
        <div class="dlabel">Message</div>
        <div class="dvalue">${esc(c.message)}</div>
      </div>
      <div class="detail-row">
        <div class="dlabel">Submitted</div>
        <div class="dvalue">${new Date(c.created_at).toLocaleString('en-GB')}</div>
      </div>
    `;

    const footer = document.getElementById('drawer-footer');
    const statuses = ['new', 'read', 'replied'];
    footer.innerHTML = statuses
      .filter(s => s !== c.status)
      .map(s => `<button class="btn btn-sm btn-${s}" onclick="updateStatus('${c.id}', '${s}')">Mark as ${s}</button>`)
      .join('');
  }

  // ── Utils ─────────────────────────────────────────────────────────────────

  function esc(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
